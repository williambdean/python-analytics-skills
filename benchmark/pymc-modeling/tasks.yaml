# PyMC Skill Benchmark — Task Definitions
# 5 tasks targeting specific skill coverage areas.
# No basic models — every task tests something the skill explicitly teaches.

preamble: |
  You are working in a directory that contains data files in data/.
  Write a Python script called model.py that builds a Bayesian model using PyMC.
  Run the script yourself. If it fails, fix it and try once more.
  Save the InferenceData to results.nc after sampling.
  Available packages: PyMC, ArviZ, nutpie, NumPy, SciPy, matplotlib, polars.

tasks:
  T1_hierarchical:
    name: "Hierarchical model (8 schools)"
    prompt: |
      A study measured the effect of coaching programs on SAT scores at 8 schools.
      The observed effects (in points) and standard errors are:

      effects = [28, 8, -3, 7, -1, 1, 18, 12]
      std = [15, 10, 16, 11, 9, 11, 10, 18]

      Build a hierarchical Bayesian model that estimates each school's effect while
      sharing information across schools. Run inference and report convergence
      diagnostics including any divergences.
    data_files: []
    judge_rubric: |
      Score 0 if no PyMC model defined.
      1 = any hierarchical structure (partial pooling attempted)
      2 = + hyperpriors on group-level mean and variance
      3 = + non-centered parameterization (offset + scale pattern)
      4 = + reasonable priors on hyperparameters (not overly narrow/wide)
      5 = + Deterministic for derived group effects (or equivalent reconstruction)
    best_practices_patterns:
      - 'coords'
      - 'dims'
      - 'nutpie'
      - 'random_seed'

  T2_ordinal:
    name: "Ordinal regression (GSS satisfaction)"
    prompt: |
      Using the GSS 2022 survey data, build a Bayesian model to predict job
      satisfaction (satjob) from depression (hlthdep), age, and sex.

      satjob is an ordinal variable with 4 ordered levels (1=Very Dissatisfied,
      2=A Little Dissatisfied, 3=Moderately Satisfied, 4=Very Satisfied).
      Choose a model that respects the ordinal nature of the outcome.

      The data is at: data/gss_2022_clean.csv
    data_files:
      - gss_2022_clean.csv
    judge_rubric: |
      Score 0 if no PyMC model defined.
      1 = any ordinal-aware model (not treating outcome as continuous)
      2 = + uses OrderedLogistic or OrderedProbit distribution
      3 = + ordered transform on cutpoints (enforces monotonicity)
      4 = + informative or reasonable cutpoint priors
      5 = + variable names and dimension names don't conflict (no "cutpoints" for both)
    best_practices_patterns:
      - 'coords'
      - 'dims'
      - 'nutpie'
      - 'random_seed'
      - 'OrderedLogistic|OrderedProbit'

  T3_stochastic_volatility:
    name: "Stochastic volatility (S&P 500 returns)"
    prompt: |
      Model the time-varying volatility of daily S&P 500 log returns. Financial
      returns exhibit "volatility clustering" — periods of high volatility tend
      to persist. Build a stochastic volatility model with a latent log-volatility
      process that evolves over time, and use a heavy-tailed likelihood to
      capture the fat tails typical of financial return distributions.

      The data is at: data/sp500_returns.csv
      Columns: date, returns (daily log returns)
    data_files:
      - sp500_returns.csv
    judge_rubric: |
      Score 0 if no PyMC model defined.
      1 = any time series model for returns (AR, random walk, etc.)
      2 = + latent volatility process using GaussianRandomWalk
      3 = + Student-T or heavy-tailed likelihood with volatility-dependent scale
      4 = + correct exp transform linking log-volatility to observation scale (e.g. exp(-2*vol))
      5 = + reasonable priors on random walk step size and degrees of freedom
    best_practices_patterns:
      - 'coords'
      - 'dims'
      - 'nutpie'
      - 'random_seed'
      - 'GaussianRandomWalk'
      - 'StudentT'

  T4_mixture:
    name: "Gaussian mixture model (clustering)"
    prompt: |
      The file data/synthetic/mixture_data.csv contains 500 univariate observations
      drawn from a mixture of Gaussian components. The number of components is
      unknown but believed to be small (2-4). Build a Bayesian Gaussian mixture
      model that estimates the number of active components, their means, standard
      deviations, and mixing weights. Address the label-switching identifiability
      problem that arises in mixture models.

      The data is at: data/synthetic/mixture_data.csv
      Columns: x
    data_files:
      - synthetic/mixture_data.csv
    judge_rubric: |
      Score 0 if no PyMC model defined.
      1 = any mixture model attempted
      2 = + uses NormalMixture or Mixture with Normal components
      3 = + Dirichlet prior on mixture weights
      4 = + ordered transform on component means to prevent label switching
      5 = + sensible initialization of ordered means (initval or testval)
    best_practices_patterns:
      - 'coords'
      - 'dims'
      - 'nutpie'
      - 'random_seed'
      - 'NormalMixture|Mixture'
      - 'Dirichlet'
      - 'ordered'

  T5_horseshoe:
    name: "Sparse variable selection (horseshoe)"
    prompt: |
      Using the GSS 2022 data, build a regression model predicting financial
      satisfaction (satfin, scale 1-3) from all available predictors: age, sex,
      hlthdep, stress, feelnerv, worry, wrkmeangfl, richwork, realrinc, anxiety,
      and hours_worked.

      With 11 predictors, many may be irrelevant. Use shrinkage priors to
      identify which variables matter. Report which predictors the model
      identifies as important vs shrunk to zero.

      The data is at: data/gss_2022_clean.csv
    data_files:
      - gss_2022_clean.csv
    judge_rubric: |
      Score 0 if no PyMC model defined.
      1 = any shrinkage prior used (not flat priors on all coefficients)
      2 = + global-local shrinkage structure (horseshoe, Finnish horseshoe, or similar)
      3 = + regularized variant (slab component) or R2D2 prior
      4 = + high target_accept (>=0.95) for horseshoe geometry
      5 = + clear identification of important vs shrunk-to-zero variables in output
    best_practices_patterns:
      - 'coords'
      - 'dims'
      - 'nutpie'
      - 'random_seed'
      - 'target_accept'
